<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Game Levels</title>
<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
  }

  .container {
    max-width: 500px;
    margin: 50px auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
  }

  button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #3b82f6;
    color: white;
  }

  #startBtn { background: #22c55e; }

  /* POPUP */
  .popup {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .popup-box {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 0 15px #000;
  }

  .popup-box h3 {
    margin-bottom: 10px;
  }

  .popup-box button {
    background: #22c55e;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Quiz Game</h2>
  <p id="levelDisplay"></p>
  <h3 id="question"></h3>
  <div id="answers"></div>
  <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3 id="popupText"></h3>
    <button onclick="nextLevel()">Continue</button>
  </div>
</div>

<script>
const levels = [
  // LEVEL 1: BODY PARTS
  [
    {q:"What part pumps blood?", a:["Lungs","Heart","Brain","Liver"], c:1},
    {q:"Used for seeing?", a:["Eyes","Ears","Nose","Mouth"], c:0},
    {q:"Used for hearing?", a:["Eyes","Ears","Hands","Feet"], c:1},
    {q:"You walk with?", a:["Hands","Head","Legs","Neck"], c:2},
    {q:"You smell with?", a:["Eyes","Ears","Nose","Tongue"], c:2}
  ],
  // LEVEL 2: TECH LANGUAGES
  [
    {q:"Used for web structure?", a:["CSS","HTML","Python","Java"], c:1},
    {q:"Used for styling?", a:["HTML","C++","CSS","PHP"], c:2},
    {q:"Programming language?", a:["HTML","CSS","JavaScript","Tag"], c:2},
    {q:"Backend language?", a:["Python","CSS","HTML","Design"], c:0},
    {q:"Used for database?", a:["SQL","HTML","CSS","JS"], c:0}
  ],
  // LEVEL 3: GENERATIONS OF COMPUTER
  [
    {q:"1st gen used?", a:["Vacuum Tubes","Transistors","AI","Cloud"], c:0},
    {q:"2nd gen used?", a:["Vacuum","Transistors","IC","Micro"], c:1},
    {q:"3rd gen used?", a:["IC","AI","Cloud","None"], c:0},
    {q:"4th gen used?", a:["Microprocessor","Vacuum","IC","Manual"], c:0},
    {q:"5th gen focuses on?", a:["AI","Vacuum","Paper","Analog"], c:0}
  ],
  // LEVEL 4: INNER PLANET
  [
    {q:"Closest to sun?", a:["Earth","Mars","Mercury","Venus"], c:2},
    {q:"Hottest planet?", a:["Earth","Venus","Mars","Mercury"], c:1},
    {q:"We live on?", a:["Mars","Earth","Venus","Jupiter"], c:1},
    {q:"Red planet?", a:["Mars","Earth","Saturn","Uranus"], c:0},
    {q:"Has no life?", a:["Earth","Mars","Both","None"], c:1}
  ],
  // LEVEL 5: BINARY
  [
    {q:"Binary of 1?", a:["0","1","10","11"], c:1},
    {q:"Binary uses?", a:["0 & 1","1-9","A-Z","Symbols"], c:0},
    {q:"10 (binary) = ?", a:["1","2","3","4"], c:1},
    {q:"11 (binary) = ?", a:["2","3","4","5"], c:1},
    {q:"100 (binary) = ?", a:["2","3","4","5"], c:2}
  ]
];

let currentLevel = 0;
let currentQuestion = 0;
let score = 0;

function startGame() {
  document.getElementById("startBtn").style.display = "none";
  loadQuestion();
}

function loadQuestion() {
  let qData = levels[currentLevel][currentQuestion];

  document.getElementById("levelDisplay").textContent =
    "Level " + (currentLevel + 1);

  document.getElementById("question").textContent = qData.q;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  qData.a.forEach((ans, idx) => {
    let btn = document.createElement("button");
    btn.textContent = ans;
    btn.onclick = () => checkAnswer(idx);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(index) {
  if (index === levels[currentLevel][currentQuestion].c) {
    score++;
  }

  currentQuestion++;

  if (currentQuestion < 5) {
    loadQuestion();
  } else {
    showPopup("🎉 Level " + (currentLevel + 1) + " Complete!");
  }
}

function showPopup(text) {
  document.getElementById("popupText").textContent = text;
  document.getElementById("popup").style.display = "flex";
}

function nextLevel() {
  document.getElementById("popup").style.display = "none";

  currentLevel++;
  currentQuestion = 0;

  if (currentLevel < levels.length) {
    loadQuestion();
  } else {
    document.querySelector(".container").innerHTML =
      "<h2>🏆 Game Finished!</h2><p>Your Score: " + score + "/25</p>";
  }
}
</script>

</body>
</html>
