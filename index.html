<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Master Quiz</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding-bottom: 50px; }
  .container { max-width: 750px; margin: 40px auto; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  button { display: block; width: 100%; margin: 10px 0; padding: 14px; border: none; border-radius: 8px; cursor: pointer; background: #3b82f6; color: white; font-weight: bold; transition: 0.2s; }
  button:hover { background: #2563eb; transform: translateY(-2px); }
  .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .hidden { display: none; }
  
  /* Progress Bar */
  #progress-bar { height: 10px; background: #334155; border-radius: 5px; margin: 20px 0; overflow: hidden; }
  #progress-fill { height: 100%; background: #22c55e; width: 0%; transition: 0.4s; }

  /* Results Table */
  .results-container { text-align: left; margin-top: 20px; max-height: 450px; overflow-y: auto; padding: 15px; background: #0f172a; border-radius: 10px; }
  .result-item { padding: 12px; border-bottom: 1px solid #334155; }
  .correct { color: #4ade80; font-weight: bold; }
  .wrong { color: #f87171; font-weight: bold; }
  .correct-label { color: #94a3b8; display: block; font-style: italic; margin-top: 4px; }

  /* Popup */
  .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
  .popup-box { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid #22c55e; }
</style>
</head>
<body>

<div class="container" id="gameContainer">
  <div id="startScreen">
    <h1>🎓 Ultimate Career Quiz</h1>
    <button style="background:#22c55e;" onclick="showCourseSelection()">Enter Quiz</button>
  </div>

  <div id="courseScreen" class="hidden">
    <h3>Select Your Specialization</h3>
    <div class="grid-select" id="courseList"></div>
  </div>

  <div id="quizScreen" class="hidden">
    <div style="display:flex; justify-content: space-between; font-size: 0.85rem; color: #94a3b8;">
        <span id="courseDisplay"></span>
        <span id="levelDisplay"></span>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <h3 id="question" style="min-height: 60px;"></h3>
    <div id="answers"></div>
  </div>

  <div id="finishScreen" class="hidden">
    <h2>📊 Final Assessment</h2>
    <h1 id="finalScoreDisplay"></h1>
    <div class="results-container" id="resultsLog"></div>
    <button onclick="location.reload()" style="margin-top:20px;">Try a Different Course</button>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupTitle">Level Complete!</h2>
    <p id="popupText"></p>
    <button onclick="nextLevel()" style="background:#22c55e;">Continue</button>
  </div>
</div>

let selectedCourse = "";
let currentLevel = 0;
let currentQuestion = 0;
let score = 0;
let userLog = [];

function showCourseSelection() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("courseScreen").classList.remove("hidden");
  const list = document.getElementById("courseList");
  list.innerHTML = "";
  Object.keys(gameData).forEach(course => {
    let btn = document.createElement("button");
    btn.textContent = course;
    btn.onclick = () => selectCourse(course);
    list.appendChild(btn);
  });
}

function selectCourse(course) {
  selectedCourse = course;
  document.getElementById("courseScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion() {
  const qData = gameData[selectedCourse][currentLevel][currentQuestion];
  document.getElementById("courseDisplay").textContent = selectedCourse;
  document.getElementById("levelDisplay").textContent = `Level ${currentLevel+1} | Q ${currentQuestion+1}/5`;
  document.getElementById("progress-fill").style.width = ((currentLevel*5 + currentQuestion)/25)*100 + "%";
  document.getElementById("question").textContent = qData.q;
  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";
  qData.a.forEach((ans, idx) => {
    let btn = document.createElement("button");
    btn.textContent = ans;
    btn.onclick = () => checkAnswer(idx);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(index) {
  const qData = gameData[selectedCourse][currentLevel][currentQuestion];
  const isCorrect = (index === qData.c);
  if (isCorrect) score++;
  userLog.push({ q: qData.q, u: qData.a[index], r: qData.a[qData.c], ok: isCorrect });
  currentQuestion++;
  if (currentQuestion < 5) loadQuestion();
  else showPopup();
}

function showPopup() {
  document.getElementById("popupText").textContent = `You finished Level ${currentLevel + 1}! Score: ${score}/25`;
  document.getElementById("popup").style.display = "flex";
}

function nextLevel() {
  document.getElementById("popup").style.display = "none";
  currentLevel++;
  currentQuestion = 0;
  if (currentLevel < 5) loadQuestion();
  else finishGame();
}

function finishGame() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("finishScreen").classList.remove("hidden");
  document.getElementById("finalScoreDisplay").textContent = `${score} / 25`;
  const log = document.getElementById("resultsLog");
  userLog.forEach((item, i) => {
    log.innerHTML += `<div class="result-item"><strong>${i+1}. ${item.q}</strong><br>
    <span class="${item.ok?'correct':'wrong'}">Your Choice: ${item.u}</span>
    ${!item.ok?`<span class="correct-label">Correct: ${item.r}</span>`:''}</div>`;
  });
}
</script>
</body>
</html>
