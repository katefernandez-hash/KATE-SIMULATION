<!DOCTYPE html>
<html>
<head>
  <title>Assignment Submission System</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background:#f5f5f5; margin:0; }
    .container { width:90%; margin:40px auto; background:antiquewhite; padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center; }
    input { padding:10px; margin:8px; border-radius:8px; border:1px solid #ccc; width:220px; }
    button { padding:12px 24px; margin:10px; border:none; border-radius:8px; background:lightpink; color:white; font-weight:bold; cursor:pointer; }
    button:hover { background:#ff7fa8; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th { background:lightpink; padding:10px; }
    td { padding:10px; border-bottom:1px solid #ddd; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); }
    .modal-box { background:white; padding:25px; border-radius:12px; text-align:center; }
  </style>
</head>
<body>

<div class="container">
  <h1>📝 Assignment Submission System</h1>

  <div id="homeScreen">
    <button onclick="showStudentForm()">Student</button>
    <button onclick="showAdminModal()">Instructor/Admin</button>
  </div>

  <div id="studentForm" style="display:none;">
    <h3>Submit Assignment</h3>
    <input type="text" id="studentName" placeholder="Student Name"><br>
    <input type="text" id="studentID" placeholder="Student ID"><br>
    <input type="text" id="course" placeholder="Course"><br>
    <input type="text" id="assignmentTitle" placeholder="Assignment Title"><br>
    <input type="file" id="fileUpload"><br>
    <button onclick="submitAssignment()">Submit</button>
    <button onclick="backToHome()">Back</button>
  </div>

  <div id="adminModal" class="modal">
    <div class="modal-box">
      <h3>Admin Login</h3>
      <input type="password" id="adminPassword" placeholder="Password"><br>
      <button onclick="confirmAdmin()">Login</button>
      <button onclick="closeAdminModal()">Back</button>
    </div>
  </div>

  <div id="adminPanel" style="display:none;">
    <button onclick="backToHome()">Back</button>
    <h3>All Submissions</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th><th>ID</th><th>Course</th><th>Assignment</th><th>File</th><th>Time</th>
        </tr>
      </thead>
      <tbody id="adminTable"></tbody>
    </table>
  </div>
</div>

<script>
let assignments = [];

// LOAD DATABASE
function loadDB(){
  assignments = JSON.parse(localStorage.getItem("assignmentsDB")) || [];
}

// SAVE DATABASE
function saveDB(){
  localStorage.setItem("assignmentsDB", JSON.stringify(assignments));
}

// NAVIGATION
function showStudentForm(){
  document.getElementById("homeScreen").style.display="none";
  document.getElementById("studentForm").style.display="block";
}

function backToHome(){
  document.getElementById("studentForm").style.display="none";
  document.getElementById("adminPanel").style.display="none";
  document.getElementById("homeScreen").style.display="block";
}

function showAdminModal(){
  document.getElementById("adminModal").style.display="flex";
}

function closeAdminModal(){
  document.getElementById("adminModal").style.display="none";
}

// SUBMIT
function submitAssignment(){
  const name=document.getElementById("studentName").value.trim();
  const id=document.getElementById("studentID").value.trim();
  const course=document.getElementById("course").value.trim();
  const assignment=document.getElementById("assignmentTitle").value.trim();
  const file=document.getElementById("fileUpload").files[0];

  if(!name||!id||!course||!assignment||!file){ alert("Fill all fields!"); return; }

  const reader=new FileReader();

  reader.onload=function(e){
    assignments.push({
      name,id,course,assignment,
      fileData:e.target.result,
      filename:file.name,
      time:new Date().toLocaleString()
    });

    saveDB();
    displayAdminRecords();
    alert("Submitted Successfully!");
  };

  reader.readAsDataURL(file);
}

// ADMIN LOGIN
function confirmAdmin(){
  let pass=document.getElementById("adminPassword").value;
  if(pass==="admin123"){
    document.getElementById("adminModal").style.display="none";
    document.getElementById("homeScreen").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    displayAdminRecords();
  } else {
    alert("Wrong password");
  }
}

// DISPLAY
function displayAdminRecords(){
  let table=document.getElementById("adminTable");
  table.innerHTML="";

  assignments.forEach(a=>{
    table.innerHTML+=`
      <tr>
        <td>${a.name}</td>
        <td>${a.id}</td>
        <td>${a.course}</td>
        <td>${a.assignment}</td>
        <td><a href="${a.fileData}" download="${a.filename}">Download</a></td>
        <td>${a.time}</td>
      </tr>
    `;
  });
}

// INIT
window.onload=function(){
  loadDB();
  displayAdminRecords();
};
</script>

</body>
</html>
