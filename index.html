<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Quiz Master</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding-bottom: 50px; }
  .container { max-width: 700px; margin: 40px auto; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  button { display: block; width: 100%; margin: 10px 0; padding: 14px; border: none; border-radius: 8px; cursor: pointer; background: #3b82f6; color: white; font-weight: bold; font-size: 1rem; transition: 0.2s; }
  button:hover { background: #2563eb; }
  .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .hidden { display: none; }
  
  /* Progress Bar */
  #progress-bar { height: 10px; background: #334155; border-radius: 5px; margin: 20px 0; overflow: hidden; }
  #progress-fill { height: 100%; background: #22c55e; width: 0%; transition: 0.4s; }

  /* Popup */
  .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
  .popup-box { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid #22c55e; max-width: 400px; }

  /* Results Table */
  .results-container { text-align: left; margin-top: 20px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
  .result-item { padding: 10px; border-bottom: 1px solid #334155; font-size: 0.9rem; }
  .correct { color: #4ade80; }
  .wrong { color: #f87171; }
  .correct-label { font-size: 0.8rem; color: #94a3b8; display: block; }
</style>
</head>
<body>

<div class="container" id="gameContainer">
  <div id="startScreen">
    <h1>🎓 Career Path Quiz</h1>
    <p>Select a course and conquer 5 levels of increasing difficulty.</p>
    <button style="background:#22c55e;" onclick="showCourseSelection()">Start Game</button>
  </div>

  <div id="courseScreen" class="hidden">
    <h3>Choose Your Profession</h3>
    <div class="grid-select" id="courseList"></div>
  </div>

  <div id="quizScreen" class="hidden">
    <div style="display:flex; justify-content: space-between; font-size: 0.8rem; color: #94a3b8;">
        <span id="courseDisplay"></span>
        <span id="levelDisplay"></span>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <h3 id="question"></h3>
    <div id="answers"></div>
  </div>

  <div id="finishScreen" class="hidden">
    <h2 id="finalTitle">🏆 Course Complete!</h2>
    <h1 id="finalScoreDisplay" style="font-size: 3rem; margin: 10px 0;"></h1>
    <p>Review your performance below:</p>
    <div class="results-container" id="resultsLog"></div>
    <button onclick="location.reload()" style="margin-top:20px;">Try Another Course</button>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2 id="popupTitle">Level Complete!</h2>
    <p id="popupText"></p>
    <button onclick="nextLevel()">Continue to Next Level</button>
  </div>
</div>

<script>
// Logic to generate 5 questions for every level for every course
const generateQuestions = (courseName) => {
  let courseData = [];
  for(let l=1; l<=5; l++) {
    let levelArr = [];
    for(let q=1; q<=5; q++) {
      levelArr.push({
        q: `${courseName} - Level ${l} - Question ${q}: What is the standard practice for this level?`,
        a: ["Answer A (Correct)", "Answer B", "Answer C", "Answer D"],
        c: 0
      });
    }
    courseData.push(levelArr);
  }
  return courseData;
};

// I've pre-filled the structural data for all courses you requested.
const courses = ["Civil Engineering", "IT", "Law", "Psychology", "Pilot", "Marine", "Agriculture", "Education"];
const gameData = {};
courses.forEach(c => gameData[c] = generateQuestions(c));

// Customizing some real questions for IT as a sample
gameData["IT"][0][0] = { q: "What does CPU stand for?", a: ["Central Process Unit", "Computer Personal Unit", "Central Processing Unit", "Central Peripheral Unit"], c: 2 };
gameData["IT"][0][1] = { q: "Which is a volatile memory?", a: ["HDD", "SSD", "ROM", "RAM"], c: 3 };

let selectedCourse = "";
let currentLevel = 0;
let currentQuestion = 0;
let score = 0;
let userLog = [];

function showCourseSelection() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("courseScreen").classList.remove("hidden");
  const list = document.getElementById("courseList");
  courses.forEach(course => {
    let btn = document.createElement("button");
    btn.textContent = course;
    btn.onclick = () => selectCourse(course);
    list.appendChild(btn);
  });
}

function selectCourse(course) {
  selectedCourse = course;
  document.getElementById("courseScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion() {
  const qData = gameData[selectedCourse][currentLevel][currentQuestion];
  document.getElementById("courseDisplay").textContent = selectedCourse;
  document.getElementById("levelDisplay").textContent = `Level ${currentLevel + 1} | Q ${currentQuestion + 1}/5`;
  
  const totalQ = 25;
  const progress = ((currentLevel * 5 + currentQuestion) / totalQ) * 100;
  document.getElementById("progress-fill").style.width = progress + "%";

  document.getElementById("question").textContent = qData.q;
  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  qData.a.forEach((ans, idx) => {
    let btn = document.createElement("button");
    btn.textContent = ans;
    btn.onclick = () => checkAnswer(idx);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(index) {
  const qData = gameData[selectedCourse][currentLevel][currentQuestion];
  const isCorrect = (index === qData.c);
  
  if (isCorrect) score++;
  
  // Save to log for the final screen
  userLog.push({
    question: qData.q,
    userAns: qData.a[index],
    correctAns: qData.a[qData.c],
    correct: isCorrect
  });

  currentQuestion++;
  if (currentQuestion < 5) {
    loadQuestion();
  } else {
    showPopup();
  }
}

function showPopup() {
  document.getElementById("popupText").textContent = `You finished Level ${currentLevel + 1}. Current Score: ${score}/25`;
  document.getElementById("popup").style.display = "flex";
}

function nextLevel() {
  document.getElementById("popup").style.display = "none";
  currentLevel++;
  currentQuestion = 0;
  if (currentLevel < 5) {
    loadQuestion();
  } else {
    showFinalResults();
  }
}

function showFinalResults() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("finishScreen").classList.remove("hidden");
  document.getElementById("finalScoreDisplay").textContent = `${score} / 25`;
  
  const logDiv = document.getElementById("resultsLog");
  logDiv.innerHTML = "";
  
  userLog.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.innerHTML = `
      <strong>Q${index+1}: ${item.question}</strong>
      <span class="${item.correct ? 'correct' : 'wrong'}">
        Your Answer: ${item.userAns} ${item.correct ? '✓' : '✗'}
      </span>
      ${!item.correct ? `<span class="correct-label">Correct Answer: ${item.correctAns}</span>` : ''}
    `;
    logDiv.appendChild(div);
  });
}
</script>

</body>
</html>
